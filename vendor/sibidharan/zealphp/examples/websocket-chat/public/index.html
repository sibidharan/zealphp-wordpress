<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZealPHP WebSocket Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 1rem 1.5rem; background: #1a1a2e; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1.2rem; color: #a0a0ff; }
  #status { font-size: 0.8rem; padding: 3px 10px; border-radius: 12px; background: #3a1a1a; color: #ff6060; }
  #status.connected { background: #1a3a1a; color: #60ff60; }
  #messages { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .msg { padding: 0.6rem 1rem; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
  .msg.mine { background: #2a2a6e; align-self: flex-end; }
  .msg.other { background: #1e2a3a; align-self: flex-start; }
  .msg.system { background: #2a2a2a; color: #888; align-self: center; font-size: 0.85rem; font-style: italic; }
  .msg .meta { font-size: 0.7rem; color: #666; margin-top: 4px; }
  #input-bar { padding: 1rem 1.5rem; background: #1a1a2e; border-top: 1px solid #2a2a4a; display: flex; gap: 0.75rem; }
  #input-bar input { flex: 1; padding: 0.7rem 1rem; border: 1px solid #3a3a5a; border-radius: 8px; background: #0f0f1a; color: #e0e0e0; font-size: 1rem; outline: none; }
  #input-bar input:focus { border-color: #6060ff; }
  #input-bar button { padding: 0.7rem 1.5rem; border: none; border-radius: 8px; background: #4040aa; color: #fff; font-size: 1rem; cursor: pointer; }
  #input-bar button:hover { background: #5050cc; }
  #input-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <h1>ZealPHP Chat</h1>
  <span id="status">disconnected</span>
</header>

<div id="messages"></div>

<div id="input-bar">
  <input type="text" id="msg" placeholder="Type a message..." autocomplete="off" disabled>
  <button id="send" disabled>Send</button>
</div>

<script>
(function() {
  var messages = document.getElementById('messages');
  var input = document.getElementById('msg');
  var sendBtn = document.getElementById('send');
  var status = document.getElementById('status');
  var myId = null;
  var ws;

  function addMessage(text, cls) {
    var div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function addChat(from, text, time) {
    var div = document.createElement('div');
    div.className = 'msg ' + (from === myId ? 'mine' : 'other');
    var body = document.createTextNode(text);
    div.appendChild(body);
    var meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = 'User ' + from + ' at ' + time;
    div.appendChild(meta);
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function connect() {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/chat');

    ws.onopen = function() {
      status.textContent = 'connected';
      status.className = 'connected';
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    };

    ws.onmessage = function(e) {
      var data = JSON.parse(e.data);
      if (data.event === 'connected') {
        myId = data.id;
        addMessage('Connected as User ' + data.id + ' (' + data.online + ' online)', 'system');
      } else if (data.event === 'join') {
        addMessage('User ' + data.id + ' joined (' + data.online + ' online)', 'system');
      } else if (data.event === 'leave') {
        addMessage('User ' + data.id + ' left (' + data.online + ' online)', 'system');
      } else if (data.message) {
        addChat(data.from, data.message, data.time);
      }
    };

    ws.onclose = function() {
      status.textContent = 'disconnected';
      status.className = '';
      input.disabled = true;
      sendBtn.disabled = true;
      addMessage('Disconnected. Reconnecting in 3s...', 'system');
      setTimeout(connect, 3000);
    };
  }

  function send() {
    var text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(text);
    input.value = '';
    input.focus();
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') send();
  });

  connect();
})();
</script>
</body>
</html>
