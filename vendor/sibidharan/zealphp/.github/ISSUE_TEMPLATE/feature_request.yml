name: "Feature Request"
description: "Suggest a feature for ZealPHP"
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case — what problem does this solve?
      description: Describe the problem this feature would solve.
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: How should this feature work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: References, examples, or any other context.
