name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: openswoole, uopz
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  phpunit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openswoole, uopz
          coverage: xdebug
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Start ZealPHP
        env:
          ZEALPHP_COMPRESSION_MIDDLEWARE: '1'
          ZEALPHP_HTTP_COMPRESSION: '0'
        run: |
          php app.php >/tmp/zealphp-server.log 2>&1 &
          echo $! > /tmp/zealphp-server.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          cat /tmp/zealphp-server.log
          exit 1

      - name: Run tests with coverage
        run: ./vendor/bin/phpunit --coverage-clover build/logs/clover.xml

      - name: Upload coverage to Codecov
        if: matrix.php == '8.3'
        uses: codecov/codecov-action@v6
        with:
          files: build/logs/clover.xml
          use_oidc: true
          fail_ci_if_error: false
